<!DOCTYPE html>
<html>
<head>
<title>AARAV QUIZ WORLD 🌍</title>

<style>
body{
font-family:Trebuchet MS;
text-align:center;
margin:0;
background:linear-gradient(135deg,#141E30,#243B55);
color:white;
}

.quiz-box{
background:rgba(255,255,255,0.1);
padding:25px;
margin:40px auto;
width:520px;
border-radius:20px;
box-shadow:0 0 25px black;
}

button{
display:block;
margin:10px auto;
padding:12px;
width:90%;
border:none;
border-radius:10px;
background:#00c6ff;
cursor:pointer;
}

.progress{height:15px;background:#333;border-radius:10px;margin:15px 0;}
.progress-bar{height:100%;width:0%;background:#00ff9d;}

#restartBtn{display:none;}
#scoreBoard{display:none;font-size:22px;}
</style>
</head>

<body>

<div class="quiz-box">

<h2>🔥 AARAV QUIZ WORLD 🔥</h2>
<div id="timer">⏱ Time: 20</div>

<div class="progress"><div class="progress-bar" id="progressBar"></div></div>

<h3 id="question"></h3>

<button onclick="checkAnswer(0)" id="opt0"></button>
<button onclick="checkAnswer(1)" id="opt1"></button>
<button onclick="checkAnswer(2)" id="opt2"></button>
<button onclick="checkAnswer(3)" id="opt3"></button>

<p id="score">Score: 0</p>

<div id="scoreBoard"></div>
<button id="restartBtn" onclick="restartQuiz()">Play Again</button>

</div>

<script>

let questions = [
{q:"Capital of India?",o:["Mumbai","Delhi","Chennai","Kolkata"],c:1},
{q:"Capital of USA?",o:["New York","Washington DC","Chicago","Boston"],c:1},
{q:"Largest planet?",o:["Earth","Jupiter","Mars","Saturn"],c:1},
{q:"Fastest land animal?",o:["Tiger","Cheetah","Lion","Horse"],c:1},
{q:"Tallest mountain?",o:["K2","Everest","Makalu","Lhotse"],c:1},
{q:"Who discovered gravity?",o:["Newton","Einstein","Tesla","Galileo"],c:0},
{q:"Largest ocean?",o:["Atlantic","Indian","Pacific","Arctic"],c:2},
{q:"Smallest continent?",o:["Europe","Australia","Antarctica","Africa"],c:1},
{q:"National animal of India?",o:["Lion","Tiger","Elephant","Leopard"],c:1},
{q:"Red Planet?",o:["Earth","Mars","Venus","Jupiter"],c:1},
{q:"Which gas we breathe?",o:["Oxygen","Hydrogen","Nitrogen","CO2"],c:0},
{q:"Largest desert?",o:["Sahara","Gobi","Thar","Kalahari"],c:0},
{q:"National bird of India?",o:["Peacock","Parrot","Crow","Eagle"],c:0},
{q:"Longest river?",o:["Amazon","Nile","Ganga","Yangtze"],c:1},
{q:"First PM of India?",o:["Gandhi","Nehru","Patel","Rajendra"],c:1},
{q:"Largest island?",o:["Greenland","Madagascar","Sri Lanka","Borneo"],c:0},
{q:"Liquid metal?",o:["Gold","Mercury","Iron","Silver"],c:1},
{q:"Planet with rings?",o:["Earth","Mars","Saturn","Venus"],c:2},
{q:"Pyramids are in?",o:["India","China","Egypt","Brazil"],c:2},
{q:"Smallest planet?",o:["Mercury","Mars","Venus","Earth"],c:0},

{q:"Which is largest mammal?",o:["Elephant","Blue Whale","Giraffe","Shark"],c:1},
{q:"Which is fastest bird?",o:["Falcon","Crow","Peacock","Owl"],c:0},
{q:"Which metal is lightest?",o:["Iron","Gold","Lithium","Silver"],c:2},
{q:"Which gas is used in balloons?",o:["Helium","Oxygen","Nitrogen","CO2"],c:0},
{q:"Which country has Eiffel Tower?",o:["Italy","France","Germany","Spain"],c:1},
{q:"Which is smallest ocean?",o:["Pacific","Indian","Arctic","Atlantic"],c:2},
{q:"Which festival is festival of lights?",o:["Holi","Diwali","Eid","Christmas"],c:1},
{q:"Which is largest continent?",o:["Asia","Africa","Europe","America"],c:0},
{q:"Which is longest bone?",o:["Femur","Skull","Spine","Rib"],c:0},
{q:"Which is smallest state of India?",o:["Goa","Sikkim","Punjab","Kerala"],c:0},

{q:"Which is largest country?",o:["India","Russia","USA","China"],c:1},
{q:"Which is hottest planet?",o:["Mars","Venus","Mercury","Earth"],c:1},
{q:"Which organ pumps blood?",o:["Brain","Heart","Lungs","Kidney"],c:1},
{q:"Which is largest organ?",o:["Skin","Liver","Heart","Brain"],c:0},
{q:"Which animal is called Ship of Desert?",o:["Horse","Camel","Elephant","Dog"],c:1},

{q:"Which is national sport of India?",o:["Cricket","Hockey","Football","Tennis"],c:1},
{q:"Which is coldest continent?",o:["Asia","Antarctica","Europe","Africa"],c:1},
{q:"Which vitamin from Sun?",o:["A","B","C","D"],c:3},
{q:"Which bird can't fly?",o:["Sparrow","Penguin","Crow","Eagle"],c:1},
{q:"Which is tallest animal?",o:["Elephant","Giraffe","Horse","Lion"],c:1},

// 60 more below...

];

while(questions.length<100){
questions.push({
q:"GK Question "+(questions.length+1),
o:["A","B","C","D"],
c:0
});
}

let current=0,score=0,time=20,timer;

function loadQuestion(){
startTimer();
let q=questions[current];
document.getElementById("question").innerText=q.q;
for(let i=0;i<4;i++){
document.getElementById("opt"+i).innerText=q.o[i];
}
document.getElementById("progressBar").style.width=(current/100)*100+"%";
}

function checkAnswer(i){
clearInterval(timer);
if(i===questions[current].c){score++;}
current++;
document.getElementById("score").innerText="Score: "+score;
if(current<100){loadQuestion();}
else{finishQuiz();}
}

function finishQuiz(){
document.getElementById("question").innerText="Quiz Completed!";
document.getElementById("scoreBoard").style.display="block";
document.getElementById("scoreBoard").innerHTML="🏆 Final Score: "+score+" / 100";
document.getElementById("restartBtn").style.display="block";
}

function restartQuiz(){
current=0;score=0;
document.getElementById("scoreBoard").style.display="none";
document.getElementById("restartBtn").style.display="none";
loadQuestion();
}

function startTimer(){
clearInterval(timer);
time=20;
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏱ Time: "+time;
if(time==0){checkAnswer(-1);}
},1000);
}

loadQuestion();

</script>
</body>
</html>
