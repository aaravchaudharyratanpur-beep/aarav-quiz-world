let current=0, score=0, timeLeft=20, timer;

function startTimer(){
  clearInterval(timer);
  timeLeft = 20;
  document.getElementById("timer").innerText = "⏱ Time: "+timeLeft;
  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = "⏱ Time: "+timeLeft;
    if(timeLeft <= 0){ checkAnswer(-1); }
  },1000);
}

function loadQuestion(){
  startTimer();
  let q = questions[current];
  document.getElementById("question").innerText = q.q;
  for(let i=0;i<4;i++){
    document.getElementById("opt"+i).innerText = q.o[i];
  }
  document.getElementById("progressBar").style.width = ((current)/100)*100+"%";
  document.getElementById("score").innerText = "Score: "+score;
}

function checkAnswer(i){
  clearInterval(timer);
  if(i === questions[current].c){ score++; }
  current++;
  if(current < questions.length){
    loadQuestion();
  } else {
    document.getElementById("question").innerText="Quiz Completed!";
    document.getElementById("scoreBoard").style.display="block";
    document.getElementById("scoreBoard").innerHTML="🏆 Final Score: "+score+" / 100";
    document.getElementById("restartBtn").style.display="block";
  }
}

function restartQuiz(){
  current=0; score=0;
  document.getElementById("scoreBoard").style.display="none";
  document.getElementById("restartBtn").style.display="none";
  loadQuestion();
}
