<!DOCTYPE html>
<html>
<head>
  <title>AARAV QUIZ WORLD 🌍 - 30 Questions</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg,#141E30,#243B55);
      color:white;
      margin:0;
      padding:0;
    }
    .quiz-box {
      background: rgba(255,255,255,0.1);
      padding: 25px;
      margin: 40px auto;
      width: 600px;
      border-radius: 15px;
      box-shadow: 0 0 25px #000;
    }
    button {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 90%;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: black;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background:#00a3cc; }
    .progress { height:15px; background:#333; border-radius:10px; margin:15px 0; }
    .progress-bar { height:100%; width:0%; background:#00ff9d; }
    #restartBtn { display:none; background:#ff4081; color:white; }
    #scoreBoard { display:none; font-size:22px; margin-top:15px; }
    #playerInput { margin:20px auto; padding:10px; font-size:16px; width:300px; border-radius:10px; border:none; }
  </style>
</head>
<body>

<div class="quiz-box" id="startBox">
  <h2>🔥 AARAV QUIZ WORLD 🔥</h2>
  <input type="text" placeholder="Enter your name" id="playerInput">
  <button onclick="startQuiz()">Start Quiz</button>
</div>

<div class="quiz-box" id="quizBox" style="display:none;">
  <h2 id="playerName"></h2>
  <div id="timer">⏱ Time: 20</div>
  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  <h3 id="question">Question text</h3>
  <button onclick="checkAnswer(0)" id="opt0">Option 1</button>
  <button onclick="checkAnswer(1)" id="opt1">Option 2</button>
  <button onclick="checkAnswer(2)" id="opt2">Option 3</button>
  <button onclick="checkAnswer(3)" id="opt3">Option 4</button>
  <p id="score">Score: 0</p>
  <div id="scoreBoard"></div>
  <button id="restartBtn" onclick="restartQuiz()">🔁 Play Again</button>
</div>

<!-- Sound Effects -->
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
// 30 GK Questions
let questions = [
{q:"1. What is the capital of India?",o:["Mumbai","Delhi","Chennai","Kolkata"],c:1},
{q:"2. Largest planet in our solar system?",o:["Earth","Mars","Jupiter","Saturn"],c:2},
{q:"3. Who invented the telephone?",o:["Bell","Edison","Tesla","Newton"],c:0},
{q:"4. What is the largest ocean?",o:["Atlantic","Indian","Pacific","Arctic"],c:2},
{q:"5. Which animal is called 'Ship of the Desert'?",o:["Camel","Horse","Elephant","Dog"],c:0},
{q:"6. Who wrote 'Romeo and Juliet'?",o:["Shakespeare","Dickens","Twain","Hemingway"],c:0},
{q:"7. What gas do humans breathe?",o:["Oxygen","Hydrogen","Carbon Dioxide","Nitrogen"],c:0},
{q:"8. Which is the tallest mountain?",o:["K2","Everest","Kanchenjunga","Makalu"],c:1},
{q:"9. Who discovered penicillin?",o:["Fleming","Curie","Newton","Darwin"],c:0},
{q:"10. What is H2O?",o:["Oxygen","Hydrogen","Water","Carbon Dioxide"],c:2},
{q:"11. Capital of Japan?",o:["Seoul","Tokyo","Beijing","Bangkok"],c:1},
{q:"12. Largest mammal?",o:["Elephant","Blue Whale","Giraffe","Shark"],c:1},
{q:"13. Which is the fastest land animal?",o:["Lion","Tiger","Cheetah","Leopard"],c:2},
{q:"14. How many continents?",o:["5","6","7","8"],c:2},
{q:"15. National flower of India?",o:["Rose","Lotus","Lily","Tulip"],c:1},
{q:"16. Largest desert?",o:["Sahara","Gobi","Thar","Kalahari"],c:0},
{q:"17. Who painted the Mona Lisa?",o:["Da Vinci","Van Gogh","Picasso","Rembrandt"],c:0},
{q:"18. Which planet is known as the Red Planet?",o:["Earth","Mars","Venus","Jupiter"],c:1},
{q:"19. Who was first President of the USA?",o:["Lincoln","Washington","Jefferson","Adams"],c:1},
{q:"20. Which is the smallest prime number?",o:["0","1","2","3"],c:2},
{q:"21. Capital of France?",o:["Paris","Berlin","Rome","Madrid"],c:0},
{q:"22. Largest river in India?",o:["Ganga","Yamuna","Godavari","Krishna"],c:0},
{q:"23. Who discovered electricity?",o:["Tesla","Faraday","Edison","Volta"],c:1},
{q:"24. Largest bird?",o:["Ostrich","Eagle","Falcon","Parrot"],c:0},
{q:"25. Which gas is essential for fire?",o:["Oxygen","Hydrogen","Carbon Dioxide","Nitrogen"],c:0},
{q:"26. Which is the hottest planet?",o:["Venus","Mercury","Mars","Jupiter"],c:0},
{q:"27. Largest island?",o:["Greenland","Borneo","Madagascar","Sri Lanka"],c:0},
{q:"28. National animal of Australia?",o:["Kangaroo","Koala","Dingo","Emu"],c:0},
{q:"29. Which element is 'Au'?",o:["Gold","Silver","Iron","Copper"],c:0},
{q:"30. Which ocean is the deepest?",o:["Atlantic","Indian","Pacific","Arctic"],c:2},
];

let current=0, score=0, timeLeft=20, timer;
let playerName="";

// Start Quiz
function startQuiz(){
  playerName = document.getElementById('playerInput').value || "Player";
  document.getElementById('playerName').innerText = "Player: "+playerName;
  document.getElementById('startBox').style.display="none";
  document.getElementById('quizBox').style.display="block";
  loadQuestion();
}

// Timer
function startTimer(){
  clearInterval(timer);
  timeLeft=20;
  document.getElementById("timer").innerText = "⏱ Time: "+timeLeft;
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = "⏱ Time: "+timeLeft;
    if(timeLeft<=0){ checkAnswer(-1); }
  },1000);
}

// Load Question
function loadQuestion(){
  startTimer();
  let q = questions[current];
  document.getElementById("question").innerText = q.q;
  for(let i=0;i<4;i++){
    document.getElementById("opt"+i).innerText = q.o[i];
  }
  document.getElementById("progressBar").style.width = (current/30)*100+"%";
  document.getElementById("score").innerText = "Score: "+score;
}

// Check Answer
function checkAnswer(i){
  clearInterval(timer);
  let correct = questions[current].c;
  if(i === correct){ score++; document.getElementById("correctSound").play(); }
  else{ document.getElementById("wrongSound").play(); }
  current++;
  if(current < questions.length){ loadQuestion(); }
  else{ finishQuiz(); }
}

// Finish Quiz
function finishQuiz(){
  document.getElementById("question").innerText="🏁 Quiz Completed!";
  document.getElementById("scoreBoard").style.display="block";
  document.getElementById("scoreBoard").innerHTML = "🏆 "+playerName+"'s Score: "+score+" / 30";
  document.getElementById("restartBtn").style.display="block";
  confettiEffect();
}

// Restart
function restartQuiz(){
  current=0; score=0;
  document.getElementById("scoreBoard").style.display="none";
  document.getElementById("restartBtn").style.display="none";
  loadQuestion();
}

// Confetti Effect
function confettiEffect(){
  let colors = ["#ff0","#0ff","#f0f","#0f0","#f00","#00f"];
  for(let i=0;i<100;i++){
    let div = document.createElement("div");
    div.style.position="fixed";
    div.style.width="10px";
    div.style.height="10px";
    div.style.background = colors[Math.floor(Math.random()*colors.length)];
    div.style.left = Math.random()*window.innerWidth+"px";
    div.style.top = Math.random()*window.innerHeight+"px";
    div.style.opacity=0.7;
    div.style.borderRadius="50%";
    div.style.zIndex=9999;
    document.body.appendChild(div);
    setTimeout(()=>div.remove(),2000+Math.random()*2000);
  }
}
</script>

</body>
</html>
